kind = "web"
previewPath = "/"
title = "La Grand Pharmacie d'Alger"
version = "1.0.0"
id = "artifacts/pharmacie-alger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22973

[services.development]
run = "pnpm --filter @workspace/pharmacie-alger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharmacie-alger", "run", "build" ]
publicDir = "artifacts/pharmacie-alger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22973"
BASE_PATH = "/"
